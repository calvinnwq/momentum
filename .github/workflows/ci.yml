name: CI

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:full

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [ -n "$base_sha" ] && ! printf '%s' "$base_sha" | grep -Eq '^0+$'; then
            MOMENTUM_FORMAT_BASE="$base_sha" pnpm format:check
          else
            pnpm format:check
          fi

      - name: Build
        run: pnpm build

      - name: Check whitespace
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [ -n "$base_sha" ] && ! printf '%s' "$base_sha" | grep -Eq '^0+$'; then
            git diff --check "$base_sha...HEAD"
          else
            git diff-tree --check --root HEAD
          fi
